<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
    <style>
        :root{--bg:#030303;--text:#f0f0f0;--t2:#888;--t3:#444;--b1:rgba(255,255,255,.05);--b2:rgba(255,255,255,.09);--gl:rgba(255,255,255,.025);--gl2:rgba(255,255,255,.05)}
        *{margin:0;padding:0;box-sizing:border-box}
        html{scroll-behavior:smooth}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}
        ::selection{background:#fff;color:#000}
        ::-webkit-scrollbar{width:2px}
        ::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
        .noise{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.02;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
        .gl{background:var(--gl);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--b1);transition:.3s}
        .gl:hover{background:var(--gl2);border-color:var(--b2)}

        nav{position:fixed;top:0;width:100%;z-index:1000;padding:14px 0;transition:.4s}
        nav.s{background:rgba(3,3,3,.88);backdrop-filter:blur(20px);border-bottom:1px solid var(--b1);padding:8px 0}
        .ni{max-width:960px;margin:0 auto;padding:0 28px;display:flex;justify-content:space-between;align-items:center}
        .logo{display:flex;align-items:center;gap:9px;text-decoration:none}
        .logo-ic{width:24px;height:24px;border-radius:6px;overflow:hidden;display:flex;align-items:center;justify-content:center}
        .logo-ic img{width:100%;height:100%;object-fit:cover;border-radius:6px}
        .logo-ic .em{font-size:15px}
        .logo-tx{font-family:'Syne',sans-serif;font-size:17px;font-weight:800;color:var(--text);letter-spacing:-1px}
        .logo-tx span{opacity:.35}
        .nl{display:flex;list-style:none;gap:1px;align-items:center}
        .nl a{color:var(--t2);text-decoration:none;padding:6px 12px;border-radius:6px;font-size:11px;font-weight:500;transition:.3s}
        .nl a:hover,.nl a.on{color:var(--text)}
        .cb{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:14px;font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-left:4px}
        .cb.o{background:rgba(255,255,255,.04);color:var(--text);border:1px solid rgba(255,255,255,.07)}
        .cb.c{background:rgba(255,255,255,.02);color:var(--t3);border:1px solid rgba(255,255,255,.03)}
        .cd{width:4px;height:4px;border-radius:50%}
        .cb.o .cd{background:#fff;box-shadow:0 0 5px rgba(255,255,255,.4);animation:dp 2s infinite}
        .cb.c .cd{background:var(--t3)}
        @keyframes dp{0%,100%{opacity:1}50%{opacity:.25}}
        .hm{display:none;flex-direction:column;gap:4px;cursor:pointer;z-index:1001;padding:4px}
        .hm span{width:17px;height:1.5px;background:var(--text);border-radius:2px;transition:.3s}
        .hm.on span:nth-child(1){transform:rotate(45deg) translate(4px,4px)}
        .hm.on span:nth-child(2){opacity:0}
        .hm.on span:nth-child(3){transform:rotate(-45deg) translate(4px,-4px)}

        .hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:100px 28px 60px}
        .hc{text-align:center;max-width:520px;position:relative;z-index:1}
        .h-av{width:76px;height:76px;border-radius:50%;margin:0 auto 18px;overflow:hidden;border:1.5px solid var(--b2);position:relative}
        .h-av img{width:100%;height:100%;object-fit:cover}
        .h-av .em{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#0a0a0a;font-size:34px}
        .h-dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;border:2px solid var(--bg)}
        .h-dot.on{background:#fff;box-shadow:0 0 6px rgba(255,255,255,.25)}
        .h-dot.off{background:var(--t3)}
        .h-name{font-family:'Syne',sans-serif;font-size:clamp(26px,5vw,42px);font-weight:800;letter-spacing:-1.5px;margin-bottom:6px;line-height:1.1}
        .h-role{font-size:10px;color:var(--t3);letter-spacing:3px;text-transform:uppercase;font-weight:400;margin-bottom:6px}
        .h-meta{display:flex;gap:14px;justify-content:center;margin-bottom:18px;flex-wrap:wrap}
        .h-mi{display:flex;align-items:center;gap:5px;font-size:10px;color:var(--t2)}
        .h-mi i{font-size:9px;opacity:.4}
        .h-bio{font-size:12px;color:var(--t2);line-height:1.9;margin-bottom:24px;font-weight:300}
        .h-links{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
        .h-lk{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;color:var(--t2);text-decoration:none;transition:.3s}
        .h-lk:hover{color:var(--text);transform:translateY(-1px)}
        .h-btns{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
        .btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:8px;font-size:11px;font-weight:500;text-decoration:none;transition:.3s;cursor:pointer;border:none;font-family:'Inter',sans-serif}
        .bw{background:#fff;color:#000}
        .bw:hover{opacity:.85;transform:translateY(-1px)}
        .bo{background:transparent;color:var(--t2);border:1px solid var(--b1)}
        .bo:hover{color:var(--text);border-color:var(--b2);transform:translateY(-1px)}

        section{padding:64px 28px;position:relative;z-index:1}
        .sh{text-align:center;margin-bottom:36px}
        .stg{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:4px;color:var(--t3);margin-bottom:7px;display:block}
        .stt{font-family:'Syne',sans-serif;font-size:clamp(18px,3vw,26px);font-weight:700;letter-spacing:-.8px;margin-bottom:6px}
        .sdd{color:var(--t3);font-size:11px;max-width:320px;margin:0 auto;line-height:1.8;font-weight:300}
        .dv{width:100%;height:1px;background:var(--b1);z-index:1;position:relative}

        .sv-g{max-width:700px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .sv-c{border-radius:10px;padding:20px 18px}
        .sv-c i{font-size:12px;color:var(--t3);margin-bottom:10px;display:block}
        .sv-c h4{font-size:12px;font-weight:600;margin-bottom:5px}
        .sv-c p{font-size:10px;color:var(--t3);line-height:1.7;font-weight:300}

        .pj-g{max-width:960px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
        .pj-c{border-radius:10px;overflow:hidden;transition:.35s;cursor:pointer}
        .pj-c:hover{transform:translateY(-3px);border-color:var(--b2)}
        .pj-img{position:relative;height:180px;overflow:hidden;background:#060606}
        .pj-img img{width:100%;height:100%;object-fit:cover;transition:.4s}
        .pj-c:hover .pj-img img{transform:scale(1.03)}
        .pj-ph{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#060606;color:var(--t3);font-size:10px;letter-spacing:2px;text-transform:uppercase}
        .pj-ov{position:absolute;inset:0;background:linear-gradient(to top,rgba(3,3,3,.9),transparent 45%)}
        .pj-twi{position:absolute;top:8px;right:8px;width:22px;height:22px;border-radius:5px;background:rgba(0,0,0,.6);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--t2)}
        .pj-b{padding:12px 16px}
        .pj-tags{display:flex;gap:4px;margin-bottom:5px;flex-wrap:wrap}
        .pj-tag{padding:2px 6px;border-radius:3px;font-size:7px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;background:rgba(255,255,255,.04);color:var(--t2);border:1px solid var(--b1)}
        .pj-n{font-family:'Syne',sans-serif;font-size:13px;font-weight:600;margin-bottom:2px}
        .pj-d{font-size:10px;color:var(--t3);line-height:1.6;font-weight:300}

        .pr-wrap{max-width:520px;margin:0 auto}
        .pr-desc{font-size:12px;color:var(--t2);line-height:1.9;font-weight:300;text-align:center;margin-bottom:24px}
        .pr-cards{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
        .pr-card{border-radius:10px;padding:22px 18px;text-align:center}
        .pr-cl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:2px;margin-bottom:8px;font-weight:500}
        .pr-cp{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;letter-spacing:-1px;margin-bottom:4px}
        .pr-cn{font-size:9px;color:var(--t3);font-weight:300}
        .pr-inc{border-radius:10px;padding:22px 20px}
        .pr-inc-t{font-size:10px;font-weight:600;margin-bottom:12px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
        .pr-inc ul{list-style:none;display:flex;flex-direction:column;gap:7px}
        .pr-inc li{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--t2);font-weight:300}
        .pr-inc li::before{content:'';width:3px;height:3px;border-radius:50%;background:var(--t3);flex-shrink:0}
        .pr-ft{margin-top:16px;text-align:center;font-size:10px;color:var(--t3);line-height:1.8;font-weight:300}

        .ct{max-width:400px;margin:0 auto;text-align:center}
        .ct>p{color:var(--t2);font-size:11px;line-height:1.8;margin-bottom:20px;font-weight:300}
        .ct-g{display:flex;flex-direction:column;gap:6px}
        .ct-l{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:8px;text-decoration:none;color:var(--text);transition:.3s}
        .ct-l:hover{transform:translateX(3px)}
        .ct-ic{width:30px;height:30px;border-radius:7px;background:rgba(255,255,255,.03);display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:12px;flex-shrink:0}
        .ct-pl{font-size:8px;color:var(--t3);text-transform:uppercase;letter-spacing:1.5px}
        .ct-vl{font-size:12px;font-weight:500}

        footer{padding:18px 28px;border-top:1px solid var(--b1);position:relative;z-index:1}
        .fw{max-width:960px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px}
        .ftt{font-size:9px;color:var(--t3);font-weight:300}
        .fss{display:flex;gap:4px}
        .fss a{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:5px;font-size:10px;color:var(--t3);text-decoration:none;transition:.3s}
        .fss a:hover{color:var(--text)}

        .lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);backdrop-filter:blur(24px);z-index:99998;align-items:center;justify-content:center;cursor:zoom-out;padding:20px}
        .lb.show{display:flex}
        .lb img{max-width:90vw;max-height:85vh;border-radius:8px;object-fit:contain}
        .lb-x{position:absolute;top:16px;right:20px;color:var(--t2);font-size:16px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;transition:.3s}
        .lb-x:hover{color:var(--text)}
        .lb-src{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:6px;font-size:10px;color:var(--t3);text-decoration:none;padding:6px 12px;border-radius:6px;background:rgba(255,255,255,.03);border:1px solid var(--b1)}
        .lb-src:hover{color:var(--t2)}

        .ao{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);backdrop-filter:blur(20px);z-index:99999;align-items:center;justify-content:center}
        .ao.show{display:flex}
        .ap{background:#060606;border:1px solid var(--b1);border-radius:12px;padding:26px;max-width:280px;width:88%;text-align:center}
        .ap h3{font-family:'Syne',sans-serif;font-size:14px;margin-bottom:2px}
        .ap>p{color:var(--t3);font-size:9px;margin-bottom:14px}
        .pw-w input{width:100%;padding:8px 12px;background:var(--gl);border:1px solid var(--b1);border-radius:6px;color:var(--text);font-family:'Inter',sans-serif;font-size:11px;outline:none;text-align:center;letter-spacing:3px}
        .pw-e{font-size:8px;color:#555;margin-top:4px;min-height:11px}
        .pw-b{padding:7px 16px;background:#fff;color:#000;border:none;border-radius:5px;cursor:pointer;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;margin-top:7px}
        .adm-c{display:none}.adm-c.u{display:block}
        .tr{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
        .tl{font-size:10px;color:var(--t2)}
        .tw{position:relative;width:38px;height:18px;cursor:pointer;display:inline-block}
        .tw input{display:none}
        .ts{position:absolute;inset:0;background:rgba(255,255,255,.05);border-radius:18px;transition:.3s;border:1px solid var(--b1)}
        .ts::before{content:'';position:absolute;width:10px;height:10px;border-radius:50%;background:var(--t3);top:3px;left:3px;transition:.3s}
        .tw input:checked+.ts{background:rgba(255,255,255,.08)}
        .tw input:checked+.ts::before{transform:translateX(20px);background:#fff;box-shadow:0 0 4px rgba(255,255,255,.2)}
        .a-st{font-size:10px;font-weight:600;margin-bottom:5px}
        .a-msg{font-size:8px;min-height:11px;margin-bottom:8px;padding:4px;border-radius:4px}
        .a-msg.ok{background:rgba(255,255,255,.03);color:var(--text)}
        .a-msg.warn{background:rgba(255,255,255,.02);color:var(--t2)}
        .a-badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:7px;font-weight:700;letter-spacing:1.5px;margin-bottom:10px;text-transform:uppercase}
        .a-badge.live{background:rgba(255,255,255,.05);color:var(--text)}
        .a-badge.local{background:rgba(255,255,255,.02);color:var(--t3)}
        .a-cl{padding:5px 14px;background:var(--gl);border:1px solid var(--b1);border-radius:5px;color:var(--t2);cursor:pointer;font-size:9px;font-family:'Inter',sans-serif}
        .fi{opacity:0;transform:translateY(16px);transition:.5s cubic-bezier(.16,1,.3,1)}
        .fi.v{opacity:1;transform:translateY(0)}
        @media(max-width:768px){
            .nl{display:none;position:fixed;inset:0;background:rgba(3,3,3,.97);backdrop-filter:blur(20px);flex-direction:column;align-items:center;justify-content:center;gap:8px}
            .nl.open{display:flex}.hm{display:flex}
            section{padding:44px 16px}.hero{padding:76px 16px 36px}
            .pj-g{grid-template-columns:1fr}
            .sv-g{grid-template-columns:1fr}
            .pr-cards{grid-template-columns:1fr}
            .fw{flex-direction:column;text-align:center}
            .ni{padding:0 16px}
        }
    </style>
</head>
<body>

<div class="noise"></div>

<div class="lb" id="lb" onclick="closeLb()">
    <div class="lb-x"><i class="fas fa-times"></i></div>
    <img id="lbImg" src="" alt="">
    <a id="lbSrc" href="" target="_blank" class="lb-src" onclick="event.stopPropagation()"><i class="fab fa-x-twitter"></i> View on Twitter</a>
</div>

<div class="ao" id="adm">
    <div class="ap">
        <h3>Admin</h3>
        <p>Enter password</p>
        <div id="pwS">
            <div class="pw-w">
                <input type="password" id="pwI" placeholder="••••" onkeydown="if(event.key==='Enter')chkPw()">
                <div class="pw-e" id="pwE"></div>
            </div>
            <button class="pw-b" onclick="chkPw()">Unlock</button>
        </div>
        <div class="adm-c" id="admC">
            <div class="a-badge" id="admBdg"></div>
            <div class="a-st" id="aSt"></div>
            <div class="tr">
                <span class="tl">Closed</span>
                <label class="tw"><input type="checkbox" id="cTog" checked><div class="ts"></div></label>
                <span class="tl">Open</span>
            </div>
            <div class="a-msg" id="aMsg"></div>
            <button class="a-cl" onclick="clAdm()">Close</button>
        </div>
    </div>
</div>

<nav id="nav">
    <div class="ni">
        <a href="#home" class="logo" id="logoEl"></a>
        <div class="hm" id="hm" onclick="this.classList.toggle('on');document.getElementById('nl').classList.toggle('open')"><span></span><span></span><span></span></div>
        <ul class="nl" id="nl"></ul>
    </div>
</nav>

<section class="hero" id="home">
    <div class="hc fi">
        <div class="h-av" id="hAv"></div>
        <div class="h-name" id="hNm"></div>
        <div class="h-role" id="hRl"></div>
        <div class="h-meta" id="hMeta"></div>
        <div class="h-bio" id="hBi"></div>
        <div class="h-links" id="hLk"></div>
        <div class="h-btns" id="hBtns"></div>
    </div>
</section>
<div class="dv"></div>

<section id="services">
    <div class="sh fi"><span class="stg" id="svcTag"></span><h2 class="stt" id="svcTitle"></h2><p class="sdd" id="svcNote"></p></div>
    <div class="sv-g" id="svcG"></div>
</section>
<div class="dv"></div>

<section id="projects">
    <div class="sh fi"><span class="stg" id="pjTag"></span><h2 class="stt" id="pjTitle"></h2><p class="sdd" id="pjNote"></p></div>
    <div class="pj-g" id="pjG"></div>
</section>
<div class="dv"></div>

<section id="pricing">
    <div class="sh fi"><span class="stg" id="prTag"></span><h2 class="stt" id="prTitle"></h2></div>
    <div class="pr-wrap fi">
        <div class="pr-desc" id="prD"></div>
        <div class="pr-cards" id="prC"></div>
        <div class="pr-inc gl" id="prI"></div>
        <div class="pr-ft" id="prF"></div>
    </div>
</section>
<div class="dv"></div>

<section id="contact">
    <div class="sh fi"><span class="stg" id="ctTag"></span><h2 class="stt" id="ctTitle"></h2></div>
    <div class="ct fi"><p id="ctD"></p><div class="ct-g" id="ctL"></div></div>
</section>

<footer><div class="fw"><div class="ftt" id="ftT"></div><div class="fss" id="ftS"></div></div></footer>

<script>

*/

const CONFIG = {


// ╔══════════════════════════════════════════════╗
// ║           🏷️  BRANDING                       ║
// ║  Your name, logo, title — the identity       ║
// ╚══════════════════════════════════════════════╝

    // Display name (shown in hero section)
    name: "emsly",

    // Navbar logo text
    // Use | to split color: left part = bright, right part = dim
    // Example: "ems|ly" shows "ems" white and "ly" gray
    logoText: "ems|ly",

    // Logo icon next to text
    // Options:
    //   emoji   → "🎨"
    //   image   → "logo.png"  (put file in your GitHub repo)
    //   nothing → ""
    logoIcon: "",

    // Your role/title
    role: "UI Designer",

    // Footer copyright
    footer: "© 2024 emsly",

    // Browser tab title (shows as "name | role")
    // Automatically generated from name + role above


// ╔══════════════════════════════════════════════╗
// ║           🔒 ADMIN                           ║
// ║  Password for the admin panel                ║
// ║  Open with: Ctrl + Shift + K                 ║
// ╚══════════════════════════════════════════════╝

    adminPassword: "emsly123",


// ╔══════════════════════════════════════════════╗
// ║           🟢 COMMISSION STATUS               ║
// ║                                              ║
// ║  true  = OPEN  (white glowing dot)           ║
// ║  false = CLOSED (gray dot)                   ║
// ║                                              ║
// ║  WITHOUT Firebase:                           ║
// ║    Change here → push to GitHub → done       ║
// ║                                              ║
// ║  WITH Firebase:                              ║
// ║    Ctrl+Shift+K → password → toggle          ║

let cO=CONFIG.commissionsOpen,fbOk=false,dbb=null;

function initFB(){
    if(CONFIG.firebase?.apiKey){
        try{firebase.initializeApp(CONFIG.firebase);dbb=firebase.database();fbOk=true;
        dbb.ref("site/commissionsOpen").on("value",s=>{const v=s.val();v!==null?upC(v):dbb.ref("site/commissionsOpen").set(CONFIG.commissionsOpen)});
        }catch(e){fbOk=false}
    }
}
function setC(o){if(fbOk&&dbb){dbb.ref("site/commissionsOpen").set(o);sMsg("✓ Saved — everyone sees this","ok")}else{upC(o);sMsg("Local only — add Firebase","warn")}}
function sMsg(t,c){const m=document.getElementById("aMsg");m.textContent=t;m.className="a-msg "+c;setTimeout(()=>{m.textContent="";m.className="a-msg"},3500)}
function upC(o){
    cO=o;const b=document.getElementById("cB"),t=document.getElementById("cT"),st=document.getElementById("aSt"),tg=document.getElementById("cTog");
    if(b){b.className=o?"cb o":"cb c"}if(t){t.textContent=o?"OPEN":"CLOSED"}
    if(st){st.textContent=o?"Status: ✅ Open":"Status: ❌ Closed";st.style.color=o?"#f0f0f0":"#444"}
    if(tg)tg.checked=o;const d=document.querySelector(".h-dot");if(d)d.className=o?"h-dot on":"h-dot off";
}
function chkPw(){const i=document.getElementById("pwI"),e=document.getElementById("pwE");if(i.value===CONFIG.adminPassword){document.getElementById("pwS").style.display="none";document.getElementById("admC").classList.add("u");const bg=document.getElementById("admBdg");bg.textContent=fbOk?"● LIVE — everyone sees":"○ LOCAL — only you";bg.className="a-badge "+(fbOk?"live":"local");upC(cO)}else{e.textContent="Wrong password";i.value="";setTimeout(()=>e.textContent="",2000)}}
function clAdm(){document.getElementById("adm").classList.remove("show");document.getElementById("pwS").style.display="";document.getElementById("admC").classList.remove("u");document.getElementById("pwI").value="";document.getElementById("pwE").textContent=""}
document.addEventListener("keydown",e=>{if(e.ctrlKey&&e.shiftKey&&e.key==="K"){e.preventDefault();document.getElementById("adm").classList.add("show");setTimeout(()=>document.getElementById("pwI").focus(),100)}});
document.getElementById("cTog").addEventListener("change",function(){setC(this.checked)});
document.getElementById("adm").addEventListener("click",function(e){if(e.target===this)clAdm()});

function openLb(src,tw){const lb=document.getElementById("lb"),img=document.getElementById("lbImg"),lk=document.getElementById("lbSrc");img.src=src;lb.classList.add("show");document.body.style.overflow="hidden";if(tw){lk.href=tw;lk.style.display="flex"}else{lk.style.display="none"}}
function closeLb(){document.getElementById("lb").classList.remove("show");document.body.style.overflow=""}

function build(){
    // Logo
    const le=document.getElementById("logoEl");let lh="";
    if(CONFIG.logoIcon){lh+=CONFIG.logoIcon.length<=4?`<div class="logo-ic"><span class="em">${CONFIG.logoIcon}</span></div>`:`<div class="logo-ic"><img src="${CONFIG.logoIcon}" alt=""></div>`}
    const lp=CONFIG.logoText.split("|");lh+=`<div class="logo-tx">${lp[0]}${lp[1]?`<span>${lp[1]}</span>`:""}</div>`;le.innerHTML=lh;
    document.title=CONFIG.name+" | "+CONFIG.role;

    // Nav
    const nl=document.getElementById("nl");
    nl.innerHTML=CONFIG.navLinks.map(n=>`<li><a href="${n.href}" onclick="cm()">${n.text}</a></li>`).join("")+`<li><span class="cb o" id="cB"><span class="cd"></span><span id="cT">OPEN</span></span></li>`;

    // Avatar
    const ha=document.getElementById("hAv");
    const av=CONFIG.avatar?(CONFIG.avatar.length<=4?`<div class="em">${CONFIG.avatar}</div>`:`<img src="${CONFIG.avatar}" alt="">`):`<div class="em">?</div>`;
    ha.innerHTML=av+`<div class="h-dot ${cO?'on':'off'}"></div>`;

    document.getElementById("hNm").textContent=CONFIG.name;
    document.getElementById("hRl").textContent=CONFIG.role;
    document.getElementById("hMeta").innerHTML=CONFIG.meta.map(m=>`<div class="h-mi"><i class="${m.icon}"></i>${m.text}</div>`).join("");
    document.getElementById("hBi").textContent=CONFIG.bio;
    document.getElementById("hLk").innerHTML=CONFIG.socials.map(s=>`<a href="${s.url}" target="_blank" class="h-lk gl" title="${s.platform}"><i class="${s.icon}"></i></a>`).join("");

    // Buttons
    document.getElementById("hBtns").innerHTML=CONFIG.buttons.map(b=>`<a href="${b.link}" class="btn ${b.style==='primary'?'bw':'bo'}"><i class="${b.icon}"></i> ${b.text}</a>`).join("");

    // Section labels
    document.getElementById("svcTag").textContent=CONFIG.servicesTag;
    document.getElementById("svcTitle").textContent=CONFIG.servicesTitle;
    document.getElementById("svcNote").textContent=CONFIG.servicesNote;
    document.getElementById("pjTag").textContent=CONFIG.projectsTag;
    document.getElementById("pjTitle").textContent=CONFIG.projectsTitle;
    if(CONFIG.projectsNote)document.getElementById("pjNote").textContent=CONFIG.projectsNote;
    document.getElementById("prTag").textContent=CONFIG.pricingTag;
    document.getElementById("prTitle").textContent=CONFIG.pricingTitle;
    document.getElementById("ctTag").textContent=CONFIG.contactTag;
    document.getElementById("ctTitle").textContent=CONFIG.contactTitle;

    // Services
    document.getElementById("svcG").innerHTML=CONFIG.services.map(s=>`<div class="sv-c gl fi"><i class="${s.icon}"></i><h4>${s.title}</h4><p>${s.desc}</p></div>`).join("");

    // Projects
    document.getElementById("pjG").innerHTML=CONFIG.projects.map(p=>{
        let img,hasImg=false;
        if(!p.image)img=`<div class="pj-ph">No preview</div>`;
        else if(p.image.length<=4)img=`<div class="pj-ph" style="font-size:28px">${p.image}</div>`;
        else{img=`<img src="${p.image}" alt="${p.title}">`;hasImg=true}
        const twi=p.tweetUrl?`<div class="pj-twi"><i class="fab fa-x-twitter"></i></div>`:"";
        const click=hasImg?`onclick="openLb('${p.image.replace(/'/g,"\\'")}','${(p.tweetUrl||"").replace(/'/g,"\\'")}')"`:p.tweetUrl?`onclick="window.open('${p.tweetUrl}','_blank')"`:"";
        return`<div class="pj-c gl fi" ${click}><div class="pj-img">${img}${twi}<div class="pj-ov"></div></div><div class="pj-b"><div class="pj-tags">${p.tags.map(t=>`<span class="pj-tag">${t}</span>`).join("")}</div><div class="pj-n">${p.title}</div><div class="pj-d">${p.desc}</div></div></div>`;
    }).join("");

    // Pricing
    const pr=CONFIG.pricing;
    document.getElementById("prD").textContent=pr.description;
    document.getElementById("prC").innerHTML=pr.tiers.map(t=>`<div class="pr-card gl"><div class="pr-cl">${t.label}</div><div class="pr-cp">R$ ${t.price}</div><div class="pr-cn">${t.note}</div></div>`).join("");
    document.getElementById("prI").innerHTML=`<div class="pr-inc-t">What's Included</div><ul>${pr.includes.map(f=>`<li>${f}</li>`).join("")}</ul>`;
    document.getElementById("prF").textContent=pr.footNote;

    // Contact
    document.getElementById("ctD").textContent=CONFIG.contactDesc;
    document.getElementById("ctL").innerHTML=CONFIG.socials.map(s=>`<a href="${s.url}" target="_blank" class="ct-l gl"><div class="ct-ic"><i class="${s.icon}"></i></div><div><div class="ct-pl">${s.platform}</div><div class="ct-vl">${s.label}</div></div></a>`).join("");

    // Footer
    document.getElementById("ftT").textContent=CONFIG.footer;
    document.getElementById("ftS").innerHTML=CONFIG.socials.map(s=>`<a href="${s.url}" target="_blank"><i class="${s.icon}"></i></a>`).join("");

    upC(CONFIG.commissionsOpen);
}

window.addEventListener("scroll",()=>{document.getElementById("nav").classList.toggle("s",scrollY>40);document.querySelectorAll("section[id]").forEach(s=>{const a=document.querySelector(`.nl a[href="#${s.id}"]`);if(a){const t=s.offsetTop-130;a.classList.toggle("on",scrollY>=t&&scrollY<t+s.offsetHeight)}})});
function cm(){document.getElementById("nl").classList.remove("open");document.getElementById("hm").classList.remove("on")}
document.addEventListener("click",e=>{const a=e.target.closest('a[href^="#"]');if(a){const t=document.querySelector(a.getAttribute("href"));if(t){e.preventDefault();t.scrollIntoView({behavior:"smooth"})}}});
const obs=new IntersectionObserver(en=>{en.forEach((e,i)=>{if(e.isIntersecting)setTimeout(()=>e.target.classList.add("v"),i*30)})},{threshold:.04});
function obsA(){document.querySelectorAll(".fi").forEach(e=>obs.observe(e))}
document.addEventListener("DOMContentLoaded",()=>{build();initFB();obsA()});
</script>
